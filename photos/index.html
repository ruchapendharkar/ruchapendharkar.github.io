<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photos — Rucha Pendharkar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #17130f;
      --surface:       #211c18;
      --surface-hover: #2a2420;
      --accent:        #6ea8d8;
      --accent-warm:   #d4a464;
      --accent-dim:    rgba(110, 168, 216, 0.10);
      --accent-border: rgba(110, 168, 216, 0.28);
      --text:          #ede8e2;
      --text-muted:    #9a938c;
      --text-faint:    #5e5853;
      --border:        rgba(237, 232, 226, 0.07);
      --border-soft:   rgba(237, 232, 226, 0.11);
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(23, 19, 15, 0.82);
      border-bottom: 1px solid var(--border);
    }

    .site-nav {
      max-width: 940px;
      margin: 0 auto;
      padding: 1.1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-family: 'Lora', Georgia, serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-logo:hover { color: var(--accent); }

    .nav-links { list-style: none; display: flex; gap: 0.15rem; }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface); }

    /* ── Footer ── */
    .site-main { flex: 1; }

    .site-footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
      color: var(--text-faint);
      font-size: 0.75rem;
      letter-spacing: 0.04em;
    }

    /* ── Responsive nav ── */
    @media (max-width: 600px) {
      .site-nav { padding: 0.9rem 1.25rem; }
      .nav-links a { padding: 0.3rem 0.5rem; font-size: 0.75rem; }
    }
  </style>

  <style>
    /* ── Page wrapper ── */
    .page-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 4rem 2rem 5rem;
    }

    .page-wrap h2 {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text);
      margin: 2.5rem 0 1.1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-soft);
    }

    .page-wrap h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.35rem;
    }

    .page-wrap p { color: var(--text-muted); line-height: 1.75; margin-bottom: 0.75rem; }
    .page-wrap ul, .page-wrap ol { padding-left: 1.25rem; color: var(--text-muted); line-height: 1.8; }
    .page-wrap li { margin-bottom: 0.3rem; }
    .page-wrap a { color: var(--accent); text-decoration: none; transition: opacity 0.2s; }
    .page-wrap a:hover { opacity: 0.8; text-decoration: underline; }
    .page-wrap strong { color: var(--text); font-weight: 600; }

    /* Page intro text */
    .page-intro {
      font-size: 1rem;
      color: var(--text-muted);
      font-weight: 300;
      line-height: 1.75;
      max-width: 620px;
      margin-bottom: 0.5rem;
    }

    /* Divider */
    hr.divider {
      margin: 2.5rem 0;
      border: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border-soft) 30%, var(--border-soft) 70%, transparent);
    }

    /* About */
    .about-section p { font-size: 1.02rem; line-height: 1.85; max-width: 720px; }

    /* Skills */
    .skills-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .skills-category {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.4rem;
    }

    .skills-category h3 {
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.85rem;
    }

    .skills-category ul { padding-left: 0; list-style: none; }

    .skills-category li {
      font-size: 0.875rem;
      color: var(--text-muted);
      padding: 0.28rem 0;
      border-bottom: 1px solid var(--border);
    }
    .skills-category li:last-child { border-bottom: none; }
    .skills-category strong { color: var(--text); font-weight: 500; }

    /* Experience */
    .experience-section { display: flex; flex-direction: column; }

    .experience-item {
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .experience-item:last-child { border-bottom: none; }

    .experience-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-bottom: 0.75rem;
    }

    .experience-header h3 { font-size: 1.02rem; font-weight: 600; color: var(--text); }

    .job-title, .project-date {
      font-size: 0.8rem;
      font-style: normal;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Projects */
    .projects-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem 1.5rem;
      transition: border-color 0.22s, transform 0.22s, box-shadow 0.22s;
    }

    .project-card:hover {
      border-color: var(--accent-border);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
    }

    .project-card h3 {
      font-family: 'Lora', Georgia, serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .project-content p { font-size: 0.875rem; margin-bottom: 0; }

    .project-tech { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.85rem; }

    .tech-tag {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      padding: 0.18rem 0.6rem;
      border-radius: 100px;
    }

    /* Education */
    .education-section { display: flex; flex-direction: column; }

    .education-item {
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .education-item:last-child { border-bottom: none; }
    .education-item h3 { font-size: 1.02rem; font-weight: 600; color: var(--text); margin-bottom: 0.3rem; }

    .degree {
      font-size: 0.8rem;
      font-style: normal;
      color: var(--accent);
      margin-bottom: 0.75rem;
      display: block;
    }

    .coursework { columns: 2; gap: 1rem; padding-left: 1.1rem; font-size: 0.85rem; }

    /* Awards */
    .awards-section ul { padding-left: 0; list-style: none; }

    .awards-section li {
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .awards-section li:last-child { border-bottom: none; }
    .awards-section li::before { content: "✦  "; color: var(--accent-warm); font-size: 0.7rem; }

    /* Contact */
    .contact-list { list-style: none; padding: 0; display: flex; flex-wrap: wrap; gap: 0.75rem; }

    .contact-list li a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.875rem;
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.5rem 1.1rem;
      border: 1px solid var(--border-soft);
      border-radius: 100px;
      background: var(--surface);
      transition: color 0.22s, border-color 0.22s, background 0.22s;
    }
    .contact-list li a:hover {
      color: var(--text);
      border-color: var(--accent-border);
      background: var(--accent-dim);
      text-decoration: none;
      opacity: 1;
    }

    /* Photo grid */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 0.875rem;
      margin-top: 1.5rem;
    }

    .photo-grid img {
      width: 100%;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      display: block;
    }
    .photo-grid img:hover {
      transform: scale(1.025);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
    }

    /* Responsive */
    @media (max-width: 700px) {
      .skills-container { grid-template-columns: 1fr; }
      .projects-container { grid-template-columns: 1fr; }
      .coursework { columns: 1; }
      .contact-list { flex-direction: column; }
      .contact-list li a { width: 100%; justify-content: center; }
      .experience-header { flex-direction: column; gap: 0.2rem; }
    }
    @media (max-width: 600px) {
      .page-wrap { padding: 2.5rem 1.25rem 4rem; }
    }
  </style>
</head>
