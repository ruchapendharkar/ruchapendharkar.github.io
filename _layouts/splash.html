<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Rucha Pendharkar — robotics engineer, maker, and writer." />
  <title>Rucha Pendharkar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:              #17130f;
      --surface:         #211c18;
      --surface-hover:   #2a2420;
      --accent:          #6ea8d8;
      --accent-dim:      rgba(110, 168, 216, 0.10);
      --accent-border:   rgba(110, 168, 216, 0.30);
      --text:            #ede8e2;
      --text-muted:      #9a938c;
      --border:          rgba(237, 232, 226, 0.07);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Header / Nav ───────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(23, 19, 15, 0.80);
      border-bottom: 1px solid var(--border);
    }

    nav {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-family: 'Lora', Georgia, serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.2s ease;
    }

    .nav-logo:hover {
      color: var(--accent);
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 0.2rem;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.83rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.42rem 0.8rem;
      border-radius: 6px;
      transition: color 0.2s ease, background 0.2s ease;
    }

    .nav-links a:hover {
      color: var(--text);
      background: var(--surface);
    }

    /* ── Main content ───────────────────────── */
    main {
      flex: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 5.5rem 2rem 5rem;
      width: 100%;
    }

    /* ── Hero ───────────────────────────────── */
    .hero {
      margin-bottom: 5.5rem;
    }

    .hero-eyebrow {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.4rem;
    }

    .hero h1 {
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(3.2rem, 7.5vw, 5.2rem);
      font-weight: 600;
      line-height: 1.08;
      color: var(--text);
      margin-bottom: 1.75rem;
      letter-spacing: -0.01em;
    }

    .hero-tagline {
      font-size: 1.15rem;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.8;
      max-width: 500px;
    }

    .hero-tagline strong {
      color: var(--text);
      font-weight: 500;
    }

    /* ── Social Links ───────────────────────── */
    .social-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 2.5rem;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      padding: 0.5rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: var(--surface);
      transition: color 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .social-link:hover {
      color: var(--text);
      border-color: var(--accent-border);
      background: var(--accent-dim);
    }

    .social-link svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    /* ── Explore Section ────────────────────── */
    .section-heading {
      font-size: 0.73rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1.1rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.875rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem 1.4rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      transition: background 0.22s ease, border-color 0.22s ease,
                  transform 0.22s ease, box-shadow 0.22s ease;
    }

    .card:hover {
      background: var(--surface-hover);
      border-color: var(--accent-border);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.32);
    }

    .card-icon {
      font-size: 1.35rem;
      line-height: 1;
      margin-bottom: 0.35rem;
    }

    .card-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
    }

    .card-desc {
      font-size: 0.855rem;
      color: var(--text-muted);
      line-height: 1.65;
      flex: 1;
    }

    .card-cta {
      margin-top: 0.85rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .card-cta-arrow {
      transition: transform 0.2s ease;
    }

    .card:hover .card-cta-arrow {
      transform: translateX(4px);
    }

    /* ── Footer ─────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.6rem 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.77rem;
      letter-spacing: 0.03em;
    }

    /* ── Responsive ─────────────────────────── */
    @media (max-width: 700px) {
      .cards {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      nav {
        padding: 1rem 1.25rem;
      }

      .nav-links a {
        padding: 0.35rem 0.55rem;
        font-size: 0.78rem;
      }

      main {
        padding: 3.5rem 1.25rem 3.5rem;
      }

      .hero {
        margin-bottom: 3.5rem;
      }

      .hero h1 {
        margin-bottom: 1.25rem;
      }

      .hero-tagline {
        font-size: 1.05rem;
      }

      .social-links {
        margin-top: 2rem;
      }
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <a href="/" class="nav-logo">Rucha Pendharkar</a>
      <ul class="nav-links">
        <li><a href="/work/">Work</a></li>
        <li><a href="/blog/">Blog</a></li>
        <li><a href="/photos/">Photos</a></li>
        <li><a href="/resume.pdf">Résumé ↗</a></li>
      </ul>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    &copy; {{ 'now' | date: "%Y" }} Rucha Pendharkar
  </footer>
</body>
</html>
