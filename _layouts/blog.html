---
layout: default
---

<section class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
  </header>

  <article class="post-content">
    {{ content }}
  </article>
</section>

{% for post in site.posts %}
  <section class="post">
    <header class="post-header">
      <h2 class="post-title">
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      </h2>
    </header>
    <article class="post-content">
      {{ post.excerpt }}
    </article>
  </section>
{% endfor %}
